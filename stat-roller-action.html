<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Abelon Stat Roller</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #080810;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 20px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #9b7fd4;
    text-align: center;
  }

  .roll-btn {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: #080810;
    background: linear-gradient(135deg, #c9a84c, #f0d060, #c9a84c);
    border: none;
    padding: 12px 32px;
    border-radius: 3px;
    cursor: pointer;
    width: 100%;
    box-shadow: 0 0 24px rgba(201,168,76,0.4);
    transition: opacity .15s, transform .1s, box-shadow .15s;
  }

  .roll-btn:hover {
    opacity: .92;
    transform: translateY(-1px);
    box-shadow: 0 0 36px rgba(201,168,76,0.6);
  }

  .roll-btn:active { transform: translateY(0); }

  .status {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: .1em;
    color: #4a3a6a;
    text-align: center;
  }

  /* GM webhook config */
  .webhook-row {
    display: none;
    gap: 6px;
    width: 100%;
  }
  .webhook-row.visible { display: flex; }
  .webhook-row input {
    flex: 1;
    background: #0e0c1a;
    border: 1px solid #2a1f4a;
    color: #c9a84c;
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-family: monospace;
  }
  .webhook-row input:focus { outline: none; border-color: #c9a84c; }
  .webhook-row button {
    font-size: 10px;
    padding: 4px 10px;
    border: 1px solid #c9a84c;
    background: transparent;
    color: #c9a84c;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
  }
  .gm-toggle {
    font-size: 10px;
    color: #2a1f4a;
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: .05em;
    font-family: 'Cinzel', serif;
  }
  .gm-toggle:hover { color: #4a3a6a; }
</style>
</head>
<body>

<h1>Abelon — Stat Roller</h1>
<button class="roll-btn" onclick="triggerRoll()">⚄ Roll My Fate</button>
<div class="status" id="status">4d6 drop lowest · six scores</div>
<div class="webhook-row" id="webhook-row">
  <input type="text" id="webhook-url" placeholder="Discord webhook URL…">
  <button onclick="saveWebhook()">Save</button>
</div>
<button class="gm-toggle" id="gm-toggle" style="display:none" onclick="toggleWebhook()">⚙ discord</button>

<script type="module">
import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@3.1.0/+esm";

const EXT_ID = "com.abelon.statroller";
const WEBHOOK_KEY = `${EXT_ID}/webhook`;

let webhookUrl = "";

window.triggerRoll = async function() {
  try {
    document.getElementById("status").textContent = "Opening the void…";
    const playerName = await OBR.player.getName();
    // Store player name and webhook for the modal to read
    await OBR.room.setMetadata({
      [`${EXT_ID}/current`]: {
        player: playerName,
        webhook: webhookUrl,
        timestamp: Date.now(),
      }
    });
    // Open the modal only for this player
    await OBR.modal.open({
      id: `${EXT_ID}/modal`,
      url: "https://abelon-stat-roller.pages.dev/stat-roller-modal.html",
      fullScreen: true,
    });
    document.getElementById("status").textContent = "4d6 drop lowest · six scores";
  } catch(e) {
    document.getElementById("status").textContent = "Error: " + e.message;
  }
};

window.saveWebhook = async function() {
  const val = document.getElementById("webhook-url").value.trim();
  if (!val.startsWith("https://discord.com/api/webhooks/")) {
    document.getElementById("status").textContent = "Invalid webhook URL";
    return;
  }
  webhookUrl = val;
  await OBR.room.setMetadata({ [WEBHOOK_KEY]: webhookUrl });
  document.getElementById("status").textContent = "Discord webhook saved.";
  document.getElementById("webhook-row").classList.remove("visible");
};

window.toggleWebhook = function() {
  document.getElementById("webhook-row").classList.toggle("visible");
};

OBR.onReady(async () => {
  const role = await OBR.player.getRole();
  if (role !== "GM") {
    document.body.style.visibility = "visible";
    return;
  }
  document.getElementById("gm-toggle").style.display = "block";
  const meta = await OBR.room.getMetadata();
  webhookUrl = meta[WEBHOOK_KEY] || "";
  if (webhookUrl) document.getElementById("webhook-url").value = webhookUrl;
  document.body.style.visibility = "visible";
});
</script>
</body>
</html>
