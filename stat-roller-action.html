<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abelon Stat Roller</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0e0c0a;
    --bg2:      #1a1510;
    --bg3:      #231d14;
    --parchment:#e8d9bc;
    --gold:     #c9a84c;
    --gold2:    #e8c96a;
    --rule:     #4a3c28;
    --ink:      #e8d9bc;
    --ink2:     #b8a882;
    --ink3:     #7a6a50;
    --red:      #c0392b;
    --glow:     rgba(201,168,76,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 17px;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg2);
    flex-shrink: 0;
    text-align: center;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: .15em;
    text-transform: uppercase;
  }

  header p {
    font-size: 13px;
    color: var(--ink3);
    margin-top: 2px;
    font-style: italic;
  }

  /* ── Roll button area ── */
  .roll-zone {
    padding: 16px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--rule);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .roll-btn {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--bg);
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    border: none;
    padding: 10px 32px;
    border-radius: 3px;
    cursor: pointer;
    width: 100%;
    transition: opacity .15s, transform .1s;
    box-shadow: 0 2px 12px rgba(201,168,76,0.3);
  }

  .roll-btn:hover { opacity: .9; transform: translateY(-1px); }
  .roll-btn:active { transform: translateY(0); }

  /* ── Latest roll display ── */
  .my-roll {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 10px 14px;
    display: none;
  }

  .my-roll.visible { display: block; }

  .my-roll-label {
    font-size: 13px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 6px;
  }

  .dice-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }

  .stat-block {
    background: var(--bg2);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 6px 4px;
    text-align: center;
  }

  .stat-score {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .stat-dice {
    font-size: 12px;
    color: var(--ink3);
    margin-top: 2px;
    line-height: 1.3;
  }

  .roll-total {
    font-size: 14px;
    color: var(--ink2);
    text-align: right;
    font-style: italic;
  }

  /* ── History ── */
  .history-label {
    padding: 8px 20px 4px;
    font-size: 12px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink3);
    border-bottom: 1px solid var(--rule);
    flex-shrink: 0;
    background: var(--bg);
  }

  .history {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
  }

  .history::-webkit-scrollbar { width: 4px; }
  .history::-webkit-scrollbar-track { background: transparent; }
  .history::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

  .history-entry {
    background: var(--bg2);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 10px 12px;
    margin-bottom: 8px;
    animation: slideIn .2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .entry-name {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--gold);
    font-weight: 600;
  }

  .entry-time {
    font-size: 12px;
    color: var(--ink3);
    font-style: italic;
  }

  .entry-scores {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .entry-score {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    background: var(--bg3);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 3px 8px;
    min-width: 36px;
    text-align: center;
  }

  .entry-score.high { color: var(--gold2); border-color: var(--gold); }
  .entry-score.low  { color: var(--ink3); }

  .entry-total {
    font-size: 13px;
    color: var(--ink3);
    font-style: italic;
  }

  .empty-state {
    text-align: center;
    color: var(--ink3);
    font-style: italic;
    padding: 24px;
    font-size: 13px;
  }

  /* ── GM clear button ── */
  .footer {
    padding: 8px 16px;
    border-top: 1px solid var(--rule);
    background: var(--bg2);
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .status {
    flex: 1;
    font-size: 11px;
    color: var(--ink3);
    font-style: italic;
  }

  .clear-btn {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 3px;
    border: 1px solid var(--rule);
    cursor: pointer;
    background: var(--bg3);
    color: var(--ink3);
    display: none;
  }

  .clear-btn:hover { color: var(--red); border-color: var(--red); }
  .clear-btn.visible { display: block; }

  .webhook-btn {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid var(--rule);
    cursor: pointer;
    background: var(--bg3);
    color: var(--ink3);
  }
  .webhook-btn:hover { color: var(--gold); border-color: var(--gold); }

  .webhook-config {
    padding: 8px 16px;
    background: var(--bg2);
    border-top: 1px solid var(--rule);
    display: flex;
    gap: 8px;
  }

  .webhook-config input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--rule);
    color: var(--ink);
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 12px;
    font-family: monospace;
  }

  .webhook-config input:focus { outline: none; border-color: var(--gold); }

  .webhook-config button {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 3px;
    border: 1px solid var(--gold);
    cursor: pointer;
    background: var(--bg3);
    color: var(--gold);
  }
</style>
</head>
<body>

<header>
  <h1>Abelon — Stat Roller</h1>
  <p>4d6, drop lowest · six scores</p>
</header>

<div class="roll-zone">
  <button class="roll-btn" onclick="rollStats()">⚄ Roll My Stats</button>
  <div class="my-roll" id="my-roll">
    <div class="my-roll-label">Your latest roll</div>
    <div class="dice-grid" id="dice-grid"></div>
    <div class="roll-total" id="roll-total"></div>
  </div>
</div>

<div class="history-label">All rolls this session</div>

<div class="history" id="history">
  <div class="empty-state" id="empty-state">No rolls yet. Be the first.</div>
</div>

<div class="webhook-config" id="webhook-config" style="display:none">
  <input type="text" id="webhook-url" placeholder="Discord webhook URL…">
  <button onclick="saveWebhook()">Save</button>
</div>

<div class="footer">
  <span class="status" id="status"></span>
  <button class="webhook-btn" id="webhook-btn" onclick="toggleWebhookConfig()" style="display:none">⚙ Discord</button>
  <button class="clear-btn" id="clear-btn" onclick="clearHistory()">Clear all rolls</button>
</div>

<script type="module">
import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@3.1.0/+esm";

const EXT_ID        = "com.abelon.statroller";
const WEBHOOK_KEY   = `${EXT_ID}/webhook`;
const HISTORY_KEY   = `${EXT_ID}/history`;
let rolls = [];   // local cache of roll history
let myName = "";
let isGM = false;

// ── Dice logic ────────────────────────────────────────────────────────────────

function d6() { return Math.floor(Math.random() * 6) + 1; }

function roll4d6DropLowest() {
  const dice = [d6(), d6(), d6(), d6()].sort((a, b) => a - b);
  const dropped = dice[0];
  const kept = dice.slice(1);
  const total = kept.reduce((a, b) => a + b, 0);
  return { kept, dropped, total };
}

function rollSixStats() {
  return Array.from({ length: 6 }, roll4d6DropLowest);
}

// ── Rendering ─────────────────────────────────────────────────────────────────

function renderMyRoll(stats) {
  const grid = document.getElementById("dice-grid");
  grid.innerHTML = "";
  stats.forEach(({ kept, dropped, total }) => {
    const block = document.createElement("div");
    block.className = "stat-block";
    block.innerHTML = `
      <div class="stat-score">${total}</div>
      <div class="stat-dice">${kept.join("+")}
<s style="color:#5a4a38">${dropped}</s></div>
    `;
    grid.appendChild(block);
  });
  const scores = stats.map(s => s.total).sort((a, b) => b - a);
  const sum = scores.reduce((a, b) => a + b, 0);
  document.getElementById("roll-total").textContent =
    `Array: ${scores.join(", ")} · Total: ${sum}`;
  document.getElementById("my-roll").classList.add("visible");
}

function renderHistory() {
  const container = document.getElementById("history");
  const empty = document.getElementById("empty-state");

  if (!container || !empty) return;

  if (rolls.length === 0) {
    empty.style.display = "block";
    [...container.querySelectorAll(".history-entry")].forEach(el => el.remove());
    return;
  }

  empty.style.display = "none";
  container.innerHTML = "";

  // Most recent first
  [...rolls].reverse().forEach(entry => {
    const scores = entry.scores;
    const sorted = [...scores].sort((a, b) => b - a);
    const max = sorted[0];
    const min = sorted[sorted.length - 1];
    const sum = scores.reduce((a, b) => a + b, 0);
    const time = new Date(entry.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    const div = document.createElement("div");
    div.className = "history-entry";
    div.innerHTML = `
      <div class="entry-header">
        <span class="entry-name">${entry.playerName}</span>
        <span class="entry-time">${time}</span>
      </div>
      <div class="entry-scores">
        ${scores.map(s => `<div class="entry-score${s === max ? " high" : s === min ? " low" : ""}">${s}</div>`).join("")}
      </div>
      <div class="entry-total">Array: ${sorted.join(", ")} · Total: ${sum}</div>
    `;
    container.appendChild(div);
  });
}

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

// ── Discord webhook integration ──────────────────────────────────────────────

let webhookUrl = "";

async function loadWebhook() {
  const roomMeta = await OBR.room.getMetadata();
  webhookUrl = roomMeta[WEBHOOK_KEY] || "";
  if (webhookUrl && document.getElementById("webhook-url")) {
    document.getElementById("webhook-url").value = webhookUrl;
  }
}

window.saveWebhook = async function() {
  const input = document.getElementById("webhook-url").value.trim();
  if (!input.startsWith("https://discord.com/api/webhooks/")) {
    setStatus("That doesn't look like a Discord webhook URL.");
    return;
  }
  webhookUrl = input;
  await OBR.room.setMetadata({ [WEBHOOK_KEY]: webhookUrl });
  setStatus("Discord webhook saved.");
  document.getElementById("webhook-config").style.display = "none";
};

window.toggleWebhookConfig = function() {
  const el = document.getElementById("webhook-config");
  el.style.display = el.style.display === "none" ? "flex" : "none";
};

async function postToDiscord(playerName, scores) {
  if (!webhookUrl) return;
  const sorted = [...scores].sort((a, b) => b - a);
  const sum = scores.reduce((a, b) => a + b, 0);
  try {
    await fetch(webhookUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: "Abelon Stat Roller",
        content: `🎲 **${playerName}** rolled stats: **${sorted.join(", ")}** (Total: ${sum})`,
      }),
    });
  } catch (e) {
    console.log("Discord post failed:", e.message);
  }
}

// ── Save/load history via room metadata ───────────────────────────────────────

async function loadHistory() {
  const roomMeta = await OBR.room.getMetadata();
  rolls = roomMeta[HISTORY_KEY] || [];
  renderHistory();
}

async function saveHistory() {
  await OBR.room.setMetadata({ [HISTORY_KEY]: rolls });
}

function syncFromMeta(meta) {
  const updated = meta[HISTORY_KEY] || [];
  // Only re-render if something actually changed
  if (JSON.stringify(updated) !== JSON.stringify(rolls)) {
    rolls = updated;
    renderHistory();
  }
}

// ── Roll ──────────────────────────────────────────────────────────────────────

window.rollStats = async function() {
  const stats = rollSixStats();
  const scores = stats.map(s => s.total);

  // Show locally immediately
  renderMyRoll(stats);

  const entry = {
    playerId: myName + "_" + Date.now(),
    playerName: myName,
    scores,
    timestamp: new Date().toISOString(),
  };

  // Add to local history
  rolls.push(entry);
  renderHistory();

  // Persist to room metadata so late-joiners see it
  await saveHistory();

  // Post directly to Discord
  await postToDiscord(myName, scores);

  setStatus("Rolled! Results shared with the party.");
};

// ── GM clear ─────────────────────────────────────────────────────────────────

window.clearHistory = async function() {
  if (!confirm("Clear all rolls for everyone?")) return;
  rolls = [];
  await OBR.room.setMetadata({ [HISTORY_KEY]: [] });
  renderHistory();
  document.getElementById("my-roll").classList.remove("visible");
  setStatus("Rolls cleared.");
};

// ── Init ──────────────────────────────────────────────────────────────────────

OBR.onReady(async () => {
  myName = await OBR.player.getName();
  const role = await OBR.player.getRole();
  isGM = role === "GM";

  // Show GM controls
  if (isGM) {
    document.getElementById("clear-btn").classList.add("visible");
    document.getElementById("webhook-btn").style.display = "block";
  }

  // Load webhook URL
  await loadWebhook();

  // Load existing history
  await loadHistory();

  // Listen for history changes from other players via room metadata
  OBR.room.onMetadataChange((meta) => {
    syncFromMeta(meta);
  });
});
</script>
</body>
</html>
