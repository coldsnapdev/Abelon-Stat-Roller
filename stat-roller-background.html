<!DOCTYPE html>
<html>
<head><title>Abelon Stat Roller Background</title></head>
<body>
<script type="module">
import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@3.1.0/+esm";

const EXT_ID = "com.abelon.statroller";
const MODAL_ID = `${EXT_ID}/modal`;

OBR.onReady(async () => {
  // Listen for roll trigger from the action popover via room metadata
  OBR.room.onMetadataChange(async (meta) => {
    if (meta[`${EXT_ID}/trigger`]) {
      // Open the modal for everyone
      await OBR.modal.open({
        id: MODAL_ID,
        url: "https://abelon-stat-roller.pages.dev/stat-roller-modal.html",
        fullScreen: true,
      });
      // Clear the trigger
      await OBR.room.setMetadata({ [`${EXT_ID}/trigger`]: null });
    }
  });
});
</script>
</body>
</html>
