  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 20%, rgba(3,2,10,0.7) 100%);
    pointer-events: none;
  }

  .container {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0; padding: 20px;
  }

  .title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(24px, 3.5vw, 40px);
    color: #f0d060;
    letter-spacing: .2em;
    text-align: center;
    opacity: 0; transform: translateY(-20px);
    transition: opacity 1s ease, transform 1s ease;
    text-shadow: 0 0 40px rgba(201,168,76,0.8), 0 0 80px rgba(201,168,76,0.3);
    margin-bottom: 6px;
  }
  .title.visible { opacity: 1; transform: translateY(0); }

  .subtitle {
    font-family: 'Crimson Text', serif;
    font-size: clamp(16px, 2vw, 22px);
    font-style: italic; color: #9b7fd4;
    letter-spacing: .1em; text-align: center;
    opacity: 0; transition: opacity 1s ease .3s;
    margin-bottom: 40px;
  }
  .subtitle.visible { opacity: .8; }

  .dice-grid {
    display: flex; gap: clamp(8px, 2vw, 20px);
    flex-wrap: wrap; justify-content: center;
    margin-bottom: 40px;
  }

  .stat-card {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    opacity: 0; transform: translateY(30px) scale(0.9);
    transition: opacity .5s ease, transform .5s ease;
  }
  .stat-card.visible { opacity: 1; transform: translateY(0) scale(1); }

  .dice-row { display: flex; gap: 5px; }

  .die {
    width: clamp(36px, 5vw, 56px);
    height: clamp(36px, 5vw, 56px);
    background: rgba(10,8,20,0.85);
    border: 1px solid #2a1f4a;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: clamp(16px, 2.2vw, 22px);
    font-weight: 700; color: #c9a84c;
    transition: border-color .3s, color .3s, background .3s;
  }
  .die.rolling { color: #6a5a8a; border-color: #1a1430; animation: dieRoll .08s infinite; }
  .die.dropped { color: #2a1f3a; border-color: #1a1020; background: rgba(5,3,10,0.9); text-decoration: line-through; text-decoration-color: #3a2a4a; }
  .die.kept { border-color: #6a4a1a; color: #f0d060; box-shadow: 0 0 10px rgba(201,168,76,0.25); }

  @keyframes dieRoll {
    0% { transform: rotate(-1deg) scale(1.02); }
    50% { transform: rotate(1deg) scale(.98); }
    100% { transform: rotate(-1deg) scale(1.02); }
  }

  .score-display {
    font-family: 'Cinzel', serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 700; color: transparent;
    background: linear-gradient(135deg, #c9a84c, #f0d060, #c9a84c);
    -webkit-background-clip: text; background-clip: text;
    line-height: 1; opacity: 0; transform: scale(0.7);
    transition: opacity .4s ease, transform .4s ease;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.6));
  }
  .score-display.visible { opacity: 1; transform: scale(1); }
  .score-display.high {
    background: linear-gradient(135deg, #f0d060, #fff4a0, #f0d060);
    -webkit-background-clip: text; background-clip: text;
    filter: drop-shadow(0 0 30px rgba(255,240,100,0.9));
  }

  .destiny {
    display: flex; flex-direction: column;
    align-items: center; gap: 14px;
    opacity: 0; transform: translateY(20px);
    transition: opacity .8s ease, transform .8s ease;
    margin-top: 10px;
  }
  .destiny.visible { opacity: 1; transform: translateY(0); }

  .destiny-line {
    width: clamp(200px, 40vw, 400px); height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
  }

  .destiny-label {
    font-family: 'Cinzel', serif;
    font-size: clamp(13px, 1.5vw, 16px);
    letter-spacing: .25em; text-transform: uppercase;
    color: #9b7fd4; text-align: center;
  }

  .destiny-scores { display: flex; gap: clamp(8px, 2vw, 16px); flex-wrap: wrap; justify-content: center; }

  .destiny-score {
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 700; color: #c9a84c;
    background: rgba(10,8,20,0.8);
    border: 1px solid #2a1f4a;
    border-radius: 6px;
    padding: clamp(6px,1vw,12px) clamp(10px,1.5vw,18px);
  }
  .destiny-score.crown { color: #f0d060; border-color: #c9a84c; box-shadow: 0 0 20px rgba(201,168,76,0.3); }

  .destiny-total {
    font-family: 'Crimson Text', serif;
    font-size: clamp(17px, 2vw, 24px);
    font-style: italic; color: #7a6a9a; text-align: center;
  }

  .destiny-phrase {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(15px, 1.8vw, 20px);
    color: #f0d060; letter-spacing: .1em; text-align: center;
    text-shadow: 0 0 20px rgba(201,168,76,0.6);
    opacity: 0; transition: opacity 1s ease .4s;
  }
  .destiny-phrase.visible { opacity: 1; }

  .close-btn {
    font-family: 'Cinzel', serif;
    font-size: clamp(14px, 1.5vw, 17px);
    letter-spacing: .15em; text-transform: uppercase;
    color: #3a2a5a; background: none;
    border: 1px solid #2a1f4a; border-radius: 3px;
    padding: 10px 28px; cursor: pointer;
    opacity: 0; transition: opacity .5s ease, color .2s, border-color .2s;
    margin-top: 20px;
  }
  .close-btn.visible { opacity: 1; }
  .close-btn:hover { color: #c9a84c; border-color: #c9a84c; }
</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="vignette"></div>

<div class="container">
  <div class="title" id="title">Your Fate is Written</div>
  <div class="subtitle" id="subtitle">The stars have always known</div>
  <div class="dice-grid" id="dice-grid"></div>
  <div class="destiny" id="destiny">
    <div class="destiny-line"></div>
    <div class="destiny-label">Your Array</div>
    <div class="destiny-scores" id="destiny-scores"></div>
    <div class="destiny-total" id="destiny-total"></div>
    <div class="destiny-phrase" id="destiny-phrase"></div>
    <div class="destiny-line"></div>
  </div>
  <button class="close-btn" id="close-btn" onclick="closeModal()">Accept Your Fate</button>
</div>

<script type="module">
import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@3.1.0/+esm";

const EXT_ID = "com.abelon.statroller";
const WEBHOOK_KEY = `${EXT_ID}/webhook`;

function d6() { return Math.floor(Math.random() * 6) + 1; }

function roll4d6DropLowest() {
  const dice = [d6(), d6(), d6(), d6()];
  const min = Math.min(...dice);
  const droppedIdx = dice.indexOf(min);
  const total = dice.reduce((a,b) => a+b, 0) - min;
  return { dice, droppedIdx, total };
}

function destinyPhrase(total) {
  if (total >= 78) return "The gods themselves take notice.";
  if (total >= 72) return "Born under a fortunate star.";
  if (total >= 66) return "A life of great promise.";
  if (total >= 60) return "The Fates have been kind.";
  if (total >= 54) return "Forged by ordinary fires.";
  if (total >= 48) return "What you lack in gift, you will earn in will.";
  return "Even the broken blade finds its purpose.";
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function rand(a,b) { return Math.floor(Math.random() * (b-a)) + a; }

async function animateStat(cardEl, statData) {
  cardEl.classList.add("visible");
  await sleep(80);

  const diceEls = cardEl.querySelectorAll(".die");
  const scoreEl = cardEl.querySelector(".score-display");

  diceEls.forEach(el => el.classList.add("rolling"));

  const duration = rand(1200, 2200);
  const steps = Math.floor(duration / 60);
  let tick = 0;
  const roller = setInterval(() => {
    diceEls.forEach(el => { el.textContent = Math.floor(Math.random() * 6) + 1; });
    if (++tick >= steps) clearInterval(roller);
  }, 60);

  await sleep(duration);

  diceEls.forEach((el, i) => {
    el.classList.remove("rolling");
    el.textContent = statData.dice[i];
    el.classList.add(i === statData.droppedIdx ? "dropped" : "kept");
  });

  await sleep(180);
  scoreEl.textContent = statData.total;
  if (statData.total >= 16) scoreEl.classList.add("high");
  scoreEl.classList.add("visible");
  await sleep(280);
}

async function runSequence(playerName, webhookUrl) {
  document.getElementById("bg").classList.add("visible");
  await sleep(600);
  document.getElementById("title").classList.add("visible");
  await sleep(300);
  document.getElementById("subtitle").classList.add("visible");
  await sleep(800);

  const grid = document.getElementById("dice-grid");
  const stats = [];

  for (let i = 0; i < 6; i++) {
    const statData = roll4d6DropLowest();
    stats.push(statData);

    const card = document.createElement("div");
    card.className = "stat-card";

    const diceRow = document.createElement("div");
    diceRow.className = "dice-row";
    statData.dice.forEach(() => {
      const die = document.createElement("div");
      die.className = "die";
      die.textContent = "·";
      diceRow.appendChild(die);
    });

    const score = document.createElement("div");
    score.className = "score-display";
    score.textContent = "—";

    card.appendChild(diceRow);
    card.appendChild(score);
    grid.appendChild(card);

    await animateStat(card, statData);
    await sleep(120);
  }

  await sleep(500);

  const scores = stats.map(s => s.total).sort((a,b) => b-a);
  const sum = scores.reduce((a,b) => a+b, 0);

  const destinyScores = document.getElementById("destiny-scores");
  scores.forEach((s, i) => {
    const el = document.createElement("div");
    el.className = "destiny-score" + (i === 0 ? " crown" : "");
    el.textContent = s;
    destinyScores.appendChild(el);
  });

  document.getElementById("destiny-total").textContent =
    `Total: ${sum}  ·  Average: ${(sum/6).toFixed(1)}`;
  document.getElementById("destiny").classList.add("visible");

  await sleep(500);

  const phrase = destinyPhrase(sum);
  const phraseEl = document.getElementById("destiny-phrase");
  phraseEl.textContent = phrase;
  phraseEl.classList.add("visible");

  await sleep(700);
  document.getElementById("close-btn").classList.add("visible");

  // Post to Discord after full reveal
  if (webhookUrl) {
    try {
      await fetch(webhookUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: "Abelon Stat Roller",
          content: `\u2728 **${playerName}** has been shaped by the cosmos.\n\uD83C\uDFB2 Array: **${scores.join(", ")}**\n\u2696\uFE0F Total: **${sum}**  ·  _${phrase}_`,
        }),
      });
    } catch(e) { console.log("Discord post failed:", e); }
  }
}

window.closeModal = async function() {
  // Signal the background script to close the modal
  // (modal iframes cannot close themselves directly)
  await OBR.room.setMetadata({ [`${EXT_ID}/close`]: true });
};

OBR.onReady(async () => {
  const meta = await OBR.room.getMetadata();
  const trigger = meta[`${EXT_ID}/trigger`];
  const webhookUrl = meta[WEBHOOK_KEY] || "";
  const playerName = trigger?.player || await OBR.player.getName();
  await runSequence(playerName, webhookUrl);
});
</script>
